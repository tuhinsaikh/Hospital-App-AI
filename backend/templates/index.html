<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hospital AI Agent</title>
    <style>
        :root {
            --primary: #2563eb;
            --bg: #f8fafc;
            --chat-bg: #ffffff;
            --user-msg: #3b82f6;
            --ai-msg: #f1f5f9;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg);
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            height: 100vh;
            box-sizing: border-box;
        }
        .container {
            width: 100%;
            max-width: 800px;
            background: var(--chat-bg);
            border-radius: 12px;
            box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        .header {
            background: var(--primary);
            color: white;
            padding: 20px;
            text-align: center;
            font-size: 1.2rem;
            font-weight: bold;
        }
        .chat-box {
            flex: 1;
            padding: 20px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }
        .message {
            max-width: 80%;
            padding: 12px 16px;
            border-radius: 8px;
            line-height: 1.5;
        }
        .user-message {
            background-color: var(--user-msg);
            color: white;
            align-self: flex-end;
            border-bottom-right-radius: 2px;
        }
        .ai-message {
            background-color: var(--ai-msg);
            color: #1e293b;
            align-self: flex-start;
            border-bottom-left-radius: 2px;
        }
        .input-area {
            padding: 20px;
            background: var(--chat-bg);
            border-top: 1px solid #e2e8f0;
            display: flex;
            gap: 10px;
        }
        input[type="text"] {
            flex: 1;
            padding: 12px;
            border: 1px solid #cbd5e1;
            border-radius: 6px;
            font-size: 1rem;
            outline: none;
        }
        input[type="text"]:focus {
            border-color: var(--primary);
        }
        button {
            background: var(--primary);
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 6px;
            font-size: 1rem;
            cursor: pointer;
            transition: background 0.2s;
        }
        button:hover {
            background: #1d4ed8;
        }
        .loading {
            display: none;
            align-self: flex-start;
            color: #64748b;
            font-size: 0.9rem;
            font-style: italic;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            🏥 Hospital AI Assistant
        </div>
        <div class="chat-box" id="chatBox">
            <div class="message ai-message">
                Hello! I am the hospital navigation assistant. How can I help you find your way today?
            </div>
            <div class="loading" id="loadingIndicator">Typing...</div>
        </div>
        <div class="input-area">
            <input type="text" id="userInput" placeholder="e.g., Where is the X-ray department?" onkeypress="handleKeyPress(event)">
            <button onclick="sendMessage()">Send</button>
        </div>
    </div>

    <script>
        const userId = "user-" + Math.random().toString(36).substr(2, 9);
        const chatBox = document.getElementById('chatBox');
        const userInput = document.getElementById('userInput');
        const loadingIndicator = document.getElementById('loadingIndicator');

        function appendMessage(text, isUser) {
            const div = document.createElement('div');
            div.className = `message ${isUser ? 'user-message' : 'ai-message'}`;
            // Simple markdown-style line break replacement
            div.innerHTML = text.replace(/\n/g, '<br>');
            chatBox.insertBefore(div, loadingIndicator);
            chatBox.scrollTop = chatBox.scrollHeight;
        }

        function handleKeyPress(e) {
            if (e.key === 'Enter') {
                sendMessage();
            }
        }

        async function sendMessage() {
            const message = userInput.value.trim();
            if (!message) return;

            // Clear input and show user message
            userInput.value = '';
            appendMessage(message, true);
            
            // Show loading state
            loadingIndicator.style.display = 'block';

            try {
                const response = await fetch('/chat', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        user_id: userId,
                        message: message
                    })
                });

                const data = await response.json();
                loadingIndicator.style.display = 'none';
                
                if (response.ok) {
                    appendMessage(data.response, false);
                } else {
                    appendMessage(`Error: ${data.detail || 'Something went wrong'}`, false);
                }
            } catch (error) {
                loadingIndicator.style.display = 'none';
                appendMessage('Error: Cannot connect to the server.', false);
            }
        }
    </script>
</body>
</html>
